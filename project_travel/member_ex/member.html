<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원 관리</title>
    <!-- 공유 스타일(버튼/배지/메시지 등) + 이 페이지용 스타일 모두 style.css 에 포함 -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- 관리자 페이지는 카드보다 넓은 전용 레이아웃 사용 -->
    <main class="admin">

        <!-- 상단 헤더: 왼쪽 제목/안내, 오른쪽 로그아웃 -->
        <header class="admin__header">
            <div class="admin__titles">
                <h1 class="admin__title">등록된 회원 목록</h1>
                <p class="admin__subtitle">전체 회원을 조회하고 이름·이메일로 검색할 수 있습니다.</p>
            </div>
            <button type="button" id="logout-btn" class="btn btn--ghost">로그아웃</button>
        </header>

        <!-- 검색 도구 모음: 검색창 + 새로고침 -->
        <div class="toolbar">
            <input
                type="search"
                id="search"
                class="toolbar__search"
                placeholder="이름 또는 이메일로 검색"
            />
            <button type="button" id="refresh-btn" class="btn btn--primary">새로고침</button>
        </div>

        <!-- 오류 메시지 표시 영역 -->
        <p id="message" class="message" role="alert"></p>

        <!-- 테이블 영역: 좁은 화면에서 가로 스크롤 -->
        <div class="table-wrap">
            <table class="member-table">
                <thead>
                    <tr>
                        <th>프로필</th>
                        <th>이름</th>
                        <th>이메일</th>
                        <th>전화번호</th>
                        <th>주소</th>
                        <th>권한</th>
                    </tr>
                </thead>
                <!-- 실제 회원 행은 member.js 가 채운다 -->
                <tbody id="member-tbody"></tbody>
            </table>
        </div>
    </main>

    <!-- 우리 스크립트 (type="module") — Supabase SDK 는 supabase.js 안에서 import 함 -->
    <script type="module" src="member.js"></script>
</body>
</html>
